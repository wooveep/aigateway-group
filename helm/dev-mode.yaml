# Unified dev mode values for the whole aigateway-group.
#
# You can disable a service for local debugging by changing one of:
#   higress-core.enabled
#   aigateway-console.enabled
#   aigateway-portal.enabled

global:
  ingressClass: aigateway
  local: true
  enableRedis: true
  enablePluginServer: true
  imagePullPolicy: IfNotPresent
  o11y:
    enabled: true
    promtail:
      enabled: false

higress-core:
  enabled: true
  postgresql:
    enabled: true
    fullnameOverride: aigateway-core-postgresql
    postgresql:
      username: portal
      password: portal
      database: aigateway_portal
      postgresPassword: postgres
      repmgrPassword: repmgr
      image:
        registry: docker.io
        repository: bitnamilegacy/postgresql-repmgr
        tag: 17.6.0-debian-12-r2
      replicaCount: 1
      persistence:
        enabled: true
        size: 2Gi
    pgpool:
      replicaCount: 1
      adminPassword: admin
      srCheckPassword: srcheck
      image:
        registry: docker.io
        repository: bitnamilegacy/pgpool
        tag: 4.6.3-debian-12-r0
  gateway:
    name: aigateway-gateway
    repository: aigateway/gateway
    tag: "1.1.0"
    service:
      type: ClusterIP
    hostPort:
      enabled: true
  controller:
    name: aigateway-controller
    repository: aigateway/controller
    tag: "1.1.0"
  pilot:
    repository: aigateway/pilot
    tag: "1.1.0"
  pluginServer:
    name: aigateway-plugin-server
    repository: aigateway/plugin-server
    tag: "1.1.0"
  redis:
    enabled: true
    fullnameOverride: redis-server
    architecture: replication
    auth:
      enabled: true
      sentinel: true
      password: aigateway-redis
    image:
      registry: docker.io
      repository: bitnamilegacy/redis
      tag: 8.0.3-debian-12-r3
    sentinel:
      enabled: true
      image:
        registry: docker.io
        repository: bitnamilegacy/redis-sentinel
        tag: 8.0.3-debian-12-r2
      masterService:
        enabled: true
        ports:
          redis: 6379
    rbac:
      create: true
    serviceAccount:
      create: true
      automountServiceAccountToken: true
    master:
      persistence:
        enabled: true
        size: 1Gi
    replica:
      replicaCount: 1
      automountServiceAccountToken: true
      persistence:
        enabled: true
        size: 1Gi

aigateway-console:
  enabled: true
  name: aigateway-console
  image:
    repository: aigateway/console
    tag: "1.1.0-dev-20260425100829"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
  ingress:
    enabled: true
    domain: console.ai.local
    paths:
      - path: /
        pathType: Prefix
  portalDatabase:
    enabled: true
    driver: postgres
    host: aigateway-core-postgresql-pgpool
    port: 5432
    database: aigateway_portal
    params: "sslmode=disable"
    secretName: aigateway-core-db
    usernameKey: username
    passwordKey: password

aigateway-portal:
  enabled: true
  name: aigateway-portal
  database:
    driver: postgres
    createSecret: false
    existingSecret: aigateway-core-db
    host: aigateway-core-postgresql-pgpool
    port: 5432
    name: aigateway_portal
    username: portal
    password: portal
    params: "sslmode=disable"
  backend:
    corePrometheusURL: "http://aigateway-console-prometheus:9090/prometheus"
  image:
    repository: aigateway/portal
    tag: "1.1.0-dev-20260425100829"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8081
  ingress:
    enabled: true
    className: aigateway
    host: portal.ai.local
    path: /
    pathType: Prefix
  session:
    secretKey: change-me-session-secret

# Config block for root scripts (ignored by Helm templates).
dev:
  namespace: aigateway-system
  releaseName: aigateway
  portForward:
    enabled: true
    bindAddress: 127.0.0.1
    localPortStart: 20000
    waitReadySeconds: 180
    includeServices:
      - aigateway-console
      - aigateway-console-grafana
      - aigateway-console-loki
      - aigateway-console-prometheus
      - aigateway-controller
      - aigateway-plugin-server
      - aigateway-core-postgresql-pgpool
      - aigateway-portal
      - redis-server
    skipServices: []
    # Fixed local ports for stable development integrations.
    servicePorts:
      aigateway-console:
        "8080": 8080
      aigateway-console-grafana:
        "3000": 3000
      aigateway-console-loki:
        "3100": 3100
        "9095": 9095
      aigateway-console-prometheus:
        "9090": 9090
      aigateway-controller:
        "443": 15443
        "8888": 8888
        "8889": 8889
        "15010": 15010
        "15012": 15012
        "15014": 15014
        "15051": 15051
      aigateway-plugin-server:
        "80": 18080
      aigateway-core-postgresql-pgpool:
        "5432": 5432
      aigateway-portal:
        "8081": 8081
      redis-server:
        "6379": 6379
